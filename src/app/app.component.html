<div style="padding: 20px; font-family: sans-serif;">
  <h1>☁️ Procesador de Excel vía API ☁️</h1>

  <button (click)="conectarDrive()" style="padding: 10px; background-color: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer;">
    Seleccionar de Drive
  </button>

  <hr>

  <div *ngIf="columnasTotales.length > 0">
    <h3>Columnas detectadas ({{ columnasTotales.length }}):</h3>
    <p>Selecciona las que deseas visualizar:</p>
    <div style="display: flex; flex-wrap: wrap; gap: 15px; background: #f4f4f4; padding: 15px; border-radius: 8px;">
      <label *ngFor="let col of columnasTotales" style="cursor: pointer;">
        <input type="checkbox" (change)="toggleColumn(col)"> {{ col }}
      </label>
    </div>
  </div>

  <hr>

  <div *ngIf="columnasSeleccionadas.length > 0" style="margin-top: 20px; overflow-x: auto;">
    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
      <thead style="background-color: #eee;">
        <tr>
          <th *ngFor="let col of columnasSeleccionadas" style="padding: 10px;">{{ col }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let fila of todasLasFilas">
          <td *ngFor="let col of columnasSeleccionadas" style="padding: 10px;">
            {{ fila[col] }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="columnasTotales.length > 0 && columnasSeleccionadas.length === 0" style="color: #666; margin-top: 10px;">
    ⚠️ Por favor, marca al menos una columna arriba para ver los datos.
  </div>
</div>
